topic_count:
  type: integer
  default: 5
  min: 3
  max: 10
  description: "Number of popular topics to display (3–10)."

period:
  type: enum
  default: "weekly"
  choices:
    - daily
    - weekly
    - monthly
    - quarterly
    - yearly
    - all
  description: "Time period for popular topics ranking."

widget_title:
  type: string
  default: "Popular"
  description: "Heading text displayed above the popular topics list."

show_on_home:
  type: bool
  default: true
  description: "Show the popular topics widget on the homepage."
